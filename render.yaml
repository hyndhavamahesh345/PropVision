services:
  - type: web
    name: visionvault-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: MODEL
        value: gemini-2.0-flash
      - key: USE_HYBRID
        value: "true"
      - key: USE_FLORENCE
        value: "false"       # disabled on free tier (not enough RAM)
      - key: MAX_FRAMES
        value: "8"
      - key: FRAME_INTERVAL_SEC
        value: "4.0"
      - key: FRAME_QUALITY
        value: "80"
      - key: YOLO_GAP_THRESHOLD
        value: "4"
      - key: MAX_FLORENCE_CALLS
        value: "0"
      - key: YOLO_SKIP_FLORENCE_TOTAL
        value: "1"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: FRAMES_DIR
        value: ./frames
